<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterDay Kitchen — System Tags & Categories</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#003141;--sky:#4EA2FD;--green:#6BBD52;--yellow:#FFC600;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --bd:1px solid #e5e7eb;--r:6px;--rlg:10px;
  --meat-hdr:#9f3a38;--vegan-hdr:#2d7a4f;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--g900);background:var(--g50);display:flex;height:100vh;overflow:hidden}

/* ── App sidebar ── */
.sidebar{width:200px;background:white;border-right:var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sl{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:var(--bd)}
.lb{width:32px;height:32px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--navy)}
.sn{flex:1;padding:8px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--g500);cursor:pointer;text-decoration:none;transition:background .12s,color .12s}
.ni:hover{background:var(--g50);color:var(--g900)}
.ni.active{background:#eff5ff;color:var(--navy);font-weight:600}
.ni svg{width:16px;height:16px;flex-shrink:0;opacity:.7}

/* ── Main layout ── */
.main{margin-left:200px;flex:1;display:flex;height:100vh;overflow:hidden}

/* ── Type sidebar ── */
.type-sidebar{width:220px;background:white;border-right:var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.type-sidebar-hdr{padding:14px 16px 10px;border-bottom:var(--bd)}
.type-sidebar-title{font-size:15px;font-weight:800;color:var(--g900)}
.type-sidebar-sub{font-size:10px;color:var(--g400);margin-top:1px}
.type-list{flex:1;overflow-y:auto;padding:6px}
.type-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);cursor:pointer;transition:all .1s;margin-bottom:1px}
.type-item:hover{background:var(--g50)}
.type-item.active{background:var(--navy);color:white}
.type-item.active .type-count{background:rgba(255,255,255,.2);color:white}
.type-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.type-label{flex:1;font-size:12px;font-weight:600}
.type-count{font-size:9px;font-weight:700;background:var(--g100);color:var(--g500);padding:1px 7px;border-radius:20px}

/* ── Content area ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content-inner{max-width:860px;width:100%}
.content-hdr{padding:12px 20px 10px;border-bottom:var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0;background:white}
.content-title{font-size:16px;font-weight:800;color:var(--g900)}
.content-sub{font-size:10px;color:var(--g400);margin-top:1px}
.btn-add{background:var(--navy);color:white;border:none;padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;margin-left:12px}
.btn-add:hover{background:#004d66}
.content-body{flex:1;overflow-y:auto;padding:0}

/* ── Section dividers ── */
.tag-section{padding:8px 20px 4px;background:var(--g50);border-bottom:var(--bd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);position:sticky;top:28px;z-index:2}

/* ── Tag rows (compact list) ── */
.tag-row{display:flex;align-items:center;padding:7px 20px;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .08s;gap:8px;min-height:38px}
.tag-row:hover{background:#f0f7ff}
.tag-row.expanded{background:#f0f7ff;border-bottom-color:var(--g200)}
.tag-emoji{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.tag-name{font-size:12px;font-weight:700;color:var(--g900);width:170px;flex-shrink:0}
.tag-subtype{font-size:8px;font-weight:600;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.03em;flex-shrink:0;min-width:70px;width:auto;text-align:center;white-space:nowrap}
.tag-subtype.allergen{background:#f87171;color:white}
.tag-subtype.dislike{background:#a78bfa;color:white}
.tag-subtype.labelallergen{background:#14b8a6;color:white}
.tag-subtype.protein{background:#f59e0b;color:white}
.tag-subtype.filter{background:#3b82f6;color:white}
.tag-subtype.badge{background:#22c55e;color:white}
.tag-subtype.filterbadge{background:linear-gradient(135deg,#3b82f6 50%,#22c55e 50%);color:white}
.tag-subtype.plan{background:#16a34a;color:white}
.tag-subtype.category{background:var(--g400);color:white}
.tag-subtype.supplier{background:#0ea5e9;color:white}
.tag-subtype.location{background:#64748b;color:white}
.tag-subtype.custom{background:#d97706;color:white}
/* Column header row */
.tag-col-header{display:flex;align-items:center;padding:4px 20px;gap:8px;border-bottom:2px solid var(--g200);background:white;position:sticky;top:0;z-index:3;min-height:28px}
.tag-col-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400)}
/* Stats inline */
.tag-stats{display:flex;gap:10px;flex-shrink:0;width:120px}
.tag-stat-inline{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--g400)}
.tag-stat-num{font-weight:800;color:var(--g700);font-size:11px;min-width:14px;text-align:right}
.tag-stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.03em}
/* Connection pills inline */
.tag-conns{display:flex;gap:4px;flex:1;flex-wrap:wrap;min-width:0}
.tag-conn-pill{background:#4a90b5;color:white;font-size:9px;font-weight:500;padding:4px 10px 4px 7px;border-radius:5px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;line-height:1.3}
.tag-conn-pill .conn-emoji{font-size:12px;display:flex;align-items:center}
.tag-conn-pill .conn-action{color:rgba(255,255,255,.85);font-weight:500}
.tag-conn-pill .conn-target{font-weight:800;color:#fff;font-size:10px}
.tag-conn-pill .conn-cat{color:rgba(255,255,255,.6);font-size:8px;font-weight:400;font-style:italic}
.tag-conn-pill.blocks,.tag-conn-pill.triggers,.tag-conn-pill.linked,.tag-conn-pill.composed{background:#4a90b5}
.tag-no-conn{font-size:9px;color:var(--g300);font-style:italic}
/* Source indicator */
.tag-source{font-size:8px;color:var(--g400);flex-shrink:0;width:50px;text-align:center}
/* Visibility dot */
.tag-vis{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tag-vis.visible{background:var(--green)}
.tag-vis.hidden{background:var(--g300)}
/* Client/Label toggle group — joined medicine pill */
.tag-toggle-group{display:flex;flex-shrink:0;overflow:hidden;margin-left:6px}
.tag-toggle-btn{font-size:7px;font-weight:700;padding:4px 9px;cursor:pointer;border:1px solid var(--g300);background:var(--g100);color:var(--g400);text-transform:uppercase;letter-spacing:.04em;transition:all .12s;user-select:none;line-height:1}
.tag-toggle-btn:first-child{border-radius:4px 0 0 4px;border-right:none}
.tag-toggle-btn:last-child{border-radius:0 4px 4px 0}
.tag-toggle-btn.on{background:#dc2626;color:white;border-color:#dc2626}
.tag-toggle-btn.label-btn.on{background:#0d9488;color:white;border-color:#0d9488}
/* Expand chevron */
.tag-chevron{font-size:10px;color:var(--g300);flex-shrink:0;transition:transform .15s;width:14px;text-align:center}
.tag-row.expanded .tag-chevron{transform:rotate(90deg);color:var(--navy)}

/* ── Expanded detail (inline accordion) ── */
.tag-row.expanded{background:#e8e0f0;border-bottom-color:#d4c8e2}
.tag-detail{display:none;padding:8px 20px 12px 54px;background:#f3eff8;border-bottom:1px solid #d4c8e2}
.tag-detail.open{display:block}
.td-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.td-section{margin-bottom:8px}
.td-section-title{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);margin-bottom:4px}
.td-stats{display:flex;gap:6px}
.td-stat{text-align:center;padding:5px 8px;background:white;border:var(--bd);border-radius:var(--r);flex:1}
.td-stat-val{font-size:15px;font-weight:800;color:var(--navy)}
.td-stat-lbl{font-size:7px;font-weight:600;color:var(--g400);text-transform:uppercase;margin-top:1px}
.td-conn-item{display:flex;align-items:center;gap:6px;padding:5px 10px;background:white;border:var(--bd);border-radius:var(--r);margin-bottom:3px;transition:background .1s}
.td-conn-icon{font-size:10px}
.td-conn-info{flex:1}
.td-conn-name{font-size:10px;font-weight:600;color:var(--g900)}
.td-conn-desc{font-size:8px;color:var(--g400)}
.td-conn-rel{font-size:7px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;color:white;flex-shrink:0}
.td-conn-rel.blocks{background:#ef4444}
.td-conn-rel.triggers{background:#22c55e}
.td-conn-rel.linked{background:#8b5cf6}
.td-conn-rel.composed{background:#3b82f6}
.td-conn-view{font-size:8px;font-weight:600;color:var(--sky);cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid var(--sky);flex-shrink:0;background:none;transition:all .1s}
.td-conn-view:hover{background:var(--sky);color:white}
.td-conn-rm{font-size:10px;color:var(--g300);cursor:pointer;padding:2px 4px;border:none;background:none;flex-shrink:0;line-height:1}
.td-conn-rm:hover{color:#dc2626}
.td-rule{background:white;border:var(--bd);border-radius:var(--r);padding:6px 10px;font-family:monospace;font-size:9px;color:var(--navy);line-height:1.4;margin-bottom:6px}
.td-settings{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:10px}
.td-settings dt{font-weight:600;color:var(--g500)}
.td-settings dd{color:var(--g700)}
.td-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--g300)}
.td-btn{padding:4px 12px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:pointer;border:var(--bd);background:white;color:var(--g500);transition:all .1s}
.td-btn:hover{background:var(--g50);color:var(--g900)}
.td-btn.danger{color:#dc2626;border-color:#fca5a5}
.td-btn.danger:hover{background:#fee2e2}
.td-btn.add{color:var(--navy);border-color:var(--sky)}
.td-btn.add:hover{background:#eff5ff}

/* ── Add modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:var(--rlg);width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.modal-hdr{padding:14px 18px 10px;border-bottom:var(--bd)}
.modal-title{font-size:15px;font-weight:800;color:var(--g900)}
.modal-body{padding:14px 18px 16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:10px;font-weight:600;color:var(--g500);margin-bottom:3px;display:block}
.modal-input{width:100%;padding:7px 10px;border:var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;outline:none}
.modal-input:focus{border-color:var(--sky)}
.modal-select{width:100%;padding:7px 10px;border:var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;outline:none;background:white}
.modal-footer{padding:10px 18px 14px;display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:7px 14px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer}
.modal-cancel{border:var(--bd);background:white;color:var(--g500)}
.modal-save{border:none;background:var(--navy);color:white}
.modal-save:hover{background:#004d66}
.modal-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.modal-toggle-label{font-size:11px;color:var(--g700)}
.toggle-btn{width:34px;height:18px;border-radius:9px;background:var(--g200);cursor:pointer;position:relative;transition:background .15s;border:none;padding:0}
.toggle-btn.on{background:var(--green)}
.toggle-btn::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:white;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-btn.on::after{left:18px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sl"><div class="lb">BD</div><span style="font-weight:600;font-size:13px">BetterDay Kitchen</span></div>
  <nav class="sn">
    <a class="ni" href="#">Dashboard</a>
    <a class="ni" href="#">Menu Builder</a>
    <a class="ni" href="#">Meal Recipes</a>
    <a class="ni active" href="#">System Tags</a>
    <a class="ni" href="#">Ingredients</a>
    <a class="ni" href="#">Inventory</a>
  </nav>
</aside>

<div class="main">
  <div class="type-sidebar">
    <div class="type-sidebar-hdr">
      <div class="type-sidebar-title">System Tags</div>
      <div class="type-sidebar-sub">Categories & connections</div>
    </div>
    <div class="type-list" id="type-list"></div>
  </div>
  <div class="content">
    <div class="content-hdr">
      <div><div class="content-title" id="content-title"></div><div class="content-sub" id="content-sub"></div></div>
      <button class="btn-add" onclick="openAddModal()">+ New Tag</button>
    </div>
    <div class="content-body" id="content-body"></div>
  </div>
</div>

<!-- Add modal -->
<div class="modal-bg" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Add New Tag</div></div>
    <div class="modal-body">
      <div class="modal-field"><label class="modal-label">Name</label><input class="modal-input" id="new-name" placeholder="e.g. Sesame"/></div>
      <div class="modal-field"><label class="modal-label">Category</label><select class="modal-select" id="new-type"></select></div>
      <!-- Emoji auto-inherited from category -->
      <div class="modal-field"><label class="modal-label">Source</label><select class="modal-select" id="new-source"><option value="ingredient">Ingredient (auto rollup)</option><option value="dish">Dish (manual)</option><option value="computed">Computed (rule)</option></select></div>
      <div class="modal-field"><div class="modal-toggle-row"><span class="modal-toggle-label">Client visible</span><button class="toggle-btn on" id="new-visible" onclick="this.classList.toggle('on')"></button></div></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="modal-btn modal-save" onclick="saveNewTag()">Create</button>
    </div>
  </div>
</div>

<!-- Connection modal -->
<div class="modal-bg" id="conn-modal" onclick="if(event.target===this)closeConnModal()">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Add Connection</div><div style="font-size:11px;color:var(--g400);margin-top:2px">From: <strong id="conn-source-name"></strong></div></div>
    <div class="modal-body">
      <div class="modal-field"><label class="modal-label">Connect to</label><select class="modal-select" id="conn-target"></select></div>
      <div class="modal-field"><label class="modal-label">Relationship</label>
        <select class="modal-select" id="conn-rel">
          <option value="blocks">🚫 Blocks — if present, target is disabled</option>
          <option value="triggers">→ Triggers — if present, target is activated</option>
          <option value="linked">🔗 Linked — shares same state</option>
          <option value="composed">🧩 Composed — target is part of this</option>
        </select>
      </div>
      <div class="modal-field"><label class="modal-label">Description (optional)</label><input class="modal-input" id="conn-desc" placeholder="e.g. If present → badge removed"/></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-cancel" onclick="closeConnModal()">Cancel</button>
      <button class="modal-btn modal-save" onclick="saveConnection()">Create</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwJ_Jan4WWLkAe0HxA35bdBws2KUOU6olTVQ0N2GE56_bXA9CBkTf7e7sd71qUWXgIS/exec";

// Icon/description map for tag types (not stored in sheet, UI-only)
const TYPE_META = {
  'allergens':{icon:'🚫',desc:'Health Canada allergens and customer preference dislikes'},
  'proteins':{icon:'🥩',desc:'Protein flags for scorecard and filtering'},
  'badges':{icon:'🏷️',desc:'Menu card badges and customer filter options'},
  'diets':{icon:'🥗',desc:'Customer meal plan subscription types'},
  'menu-cats':{icon:'📋',desc:'Website menu sections'},
  'ingredient-cats':{icon:'🧂',desc:'Organization of raw ingredients'},
  'suppliers':{icon:'🚚',desc:'Ingredient vendors'},
  'storage':{icon:'📍',desc:'Kitchen storage zones'},
};

let TAG_TYPES = [];
// Default fallback in case sheet is empty
const DEFAULT_TYPES = [
  {id:'allergens',name:'Allergens & Dislikes',icon:'🚫',color:'#dc2626',desc:'Health Canada allergens and customer preference dislikes'},
  {id:'proteins',name:'Protein Types',icon:'🥩',color:'#9f3a38',desc:'Protein flags for scorecard and filtering'},
  {id:'badges',name:'Badges & Filters',icon:'🏷️',color:'#7c3aed',desc:'Menu card badges and customer filter options'},
  {id:'diets',name:'Diet Plans',icon:'🥗',color:'#2d7a4f',desc:'Customer meal plan subscription types'},
  {id:'menu-cats',name:'Menu Categories',icon:'📋',color:'#2d5fa6',desc:'Website menu sections'},
  {id:'ingredient-cats',name:'Ingredient Categories',icon:'🧂',color:'#d97706',desc:'Organization of raw ingredients'},
  {id:'suppliers',name:'Suppliers',icon:'🚚',color:'#0d9488',desc:'Ingredient vendors'},
  {id:'storage',name:'Storage Locations',icon:'📍',color:'#475569',desc:'Kitchen storage zones'},
];

let TAGS = []; // Loaded from Google Sheet

// ── GAS API helper ──
async function gasPost(payload){
  const res = await fetch(GAS_URL, {method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'}});
  return res.json();
}

async function loadFromSheet(){
  try{
    document.getElementById('content-body').innerHTML='<div style="padding:40px;text-align:center;color:var(--g400)">Loading from Google Sheet...</div>';
    const data = await gasPost({action:'get_all_tags'});

    // Build TAG_TYPES from sheet data
    if(data.types && data.types.length){
      TAG_TYPES = data.types.map(t=>({
        id:t.typeId,
        name:t.name,
        icon:(TYPE_META[t.typeId]||{}).icon||'🏷️',
        color:t.color||'#475569',
        desc:(TYPE_META[t.typeId]||{}).desc||''
      }));
    } else {
      TAG_TYPES = DEFAULT_TYPES;
    }

    // Build TAGS from sheet data + connections
    const connMap = {}; // sourceTagId -> [{tid,rel,d}]
    (data.connections||[]).forEach(c=>{
      const src = c.sourceTagId;
      if(!connMap[src]) connMap[src]=[];
      connMap[src].push({tid:c.targetTagId, rel:c.relationship, d:c.description||c.relationship});
    });

    TAGS = (data.tags||[]).map(t=>({
      id:t.tagId,
      name:t.name,
      type:t.typeId,
      emoji:(TYPE_META[t.typeId]||{}).icon||'🏷️', // inherit category emoji
      subtype:t.subtype||'',
      source:t.source||'ingredient',
      visible:t.clientVisible===true||t.clientVisible==='TRUE',
      labelBold:t.labelBold===true||t.labelBold==='TRUE',
      ing:0, sub:0, dish:0, // counts will come from live data eventually
      conns:connMap[t.tagId]||[],
      rule:t.rule||''
    }));

    console.log(`Loaded ${TAGS.length} tags, ${TAG_TYPES.length} types, ${(data.connections||[]).length} connections`);
    renderTypeList();
    renderContent();
  } catch(err){
    console.error('Failed to load from sheet:', err);
    // Fall back to defaults
    TAG_TYPES = DEFAULT_TYPES;
    document.getElementById('content-body').innerHTML='<div style="padding:40px;text-align:center;color:#dc2626">Failed to load from Google Sheet. Check console for details.</div>';
  }
}

// ── Sync mutations back to sheet ──
async function gasAddTag(tag){
  return gasPost({action:'add_tag', tagId:tag.id, name:tag.name, typeId:tag.type, subtype:tag.subtype, source:tag.source, clientVisible:tag.visible, rule:tag.rule||''});
}
async function gasDeleteTag(tagId){
  return gasPost({action:'delete_tag', tagId});
}
async function gasAddConnection(sourceTagId, targetTagId, relationship, description){
  return gasPost({action:'add_connection', sourceTagId, targetTagId, relationship, description});
}

// PLACEHOLDER — replaced hardcoded array below
const _TAGS_PLACEHOLDER = [
  {id:'peanuts',name:'Peanuts',type:'allergens',emoji:'🥜',subtype:'Allergen',source:'ingredient',visible:true,ing:3,sub:0,dish:8,conns:[]},
  {id:'tree-nuts',name:'Tree Nuts',type:'allergens',emoji:'🌰',subtype:'Allergen',source:'ingredient',visible:true,ing:5,sub:1,dish:12,conns:[]},
  {id:'eggs',name:'Eggs',type:'allergens',emoji:'🥚',subtype:'Allergen',source:'ingredient',visible:true,ing:8,sub:2,dish:15,conns:[]},

let activeType='allergens';
let expandedTag=null;

function renderTypeList(){
  document.getElementById('type-list').innerHTML=TAG_TYPES.map(t=>{
    const n=TAGS.filter(x=>x.type===t.id).length;
    return `<div class="type-item${t.id===activeType?' active':''}" onclick="selectType('${t.id}')">
      <span class="type-icon">${t.icon}</span><span class="type-label">${t.name}</span><span class="type-count">${n}</span>
    </div>`;
  }).join('');
}

function selectType(id){
  activeType=id;expandedTag=null;
  const t=TAG_TYPES.find(x=>x.id===id);
  document.getElementById('content-title').textContent=t.name;
  document.getElementById('content-sub').textContent=t.desc;
  renderTypeList();renderContent();
}

// Helper: get readable connection label with category
function connLabel(c){
  const target=TAGS.find(x=>x.id===c.tid);
  if(!target) return c.tid;
  const tType=target?TAG_TYPES.find(x=>x.id===target.type):null;
  const catName=tType?tType.name:'';
  const emoji=c.rel==='blocks'?'⛔':c.rel==='triggers'?'⚡':c.rel==='linked'?'🔗':c.rel==='composed'?'🧩':'→';
  const action=c.rel==='blocks'?'blocks':c.rel==='triggers'?'triggers':c.rel==='linked'?'linked to':c.rel==='composed'?'includes':'→';
  return `<span class="conn-emoji">${emoji}</span><span class="conn-action">${action}</span><span class="conn-target">${target.name}</span><span class="conn-cat">· ${target.subtype}</span>`;
}

function renderContent(){
  const tags=TAGS.filter(t=>t.type===activeType);
  const subtypes=[...new Set(tags.map(t=>t.subtype))];
  const body=document.getElementById('content-body');
  let html='';

  // Column headers
  const isAllergens = activeType==='allergens';
  html+=`<div class="tag-col-header">
    <span class="tag-col-label" style="width:14px"></span>
    <span class="tag-col-label" style="width:20px"></span>
    <span class="tag-col-label" style="width:170px">Name</span>
    <span class="tag-col-label" style="min-width:70px;width:auto;text-align:center">Type</span>
    ${isAllergens?`
      <span class="tag-col-label" style="text-align:center;flex-shrink:0;width:96px">Visibility</span>
    `:''}
    <span class="tag-col-label" style="width:50px;text-align:center">Source</span>
    <span class="tag-col-label" style="width:120px">Stats</span>
    <span class="tag-col-label" style="flex:1">Connections</span>
  </div>`;

  subtypes.forEach(st=>{
    if(subtypes.length>1) html+=`<div class="tag-section">${st}s</div>`;
    tags.filter(t=>t.subtype===st).forEach(tag=>{
      const isExp=expandedTag===tag.id;
      const stCls=st.toLowerCase().replace(/[^a-z]/g,'');
      html+=`<div class="tag-row${isExp?' expanded':''}" onclick="toggleExpand('${tag.id}')">
        <span class="tag-chevron">›</span>
        <span class="tag-emoji">${tag.emoji}</span>
        <span class="tag-name">${tag.name}</span>
        <span class="tag-subtype ${stCls}">${st}</span>
        ${activeType==='allergens'?`
          <div class="tag-toggle-group">
            <span class="tag-toggle-btn ${tag.visible?'on':''}" onclick="event.stopPropagation();toggleTagProp('${tag.id}','visible')" title="Client-facing filter">Client</span>
            <span class="tag-toggle-btn label-btn ${tag.labelBold?'on':''}" onclick="event.stopPropagation();toggleTagProp('${tag.id}','labelBold')" title="Bold on physical label">Label</span>
          </div>
        `:''}
        <span class="tag-source">${tag.source==='ingredient'?'From Ingr.':tag.source==='dish'?'Per Dish':'Calculated'}</span>
        <div class="tag-stats">
          ${tag.ing?`<div class="tag-stat-inline"><span class="tag-stat-num">${tag.ing}</span><span class="tag-stat-lbl">ingr</span></div>`:''}
          ${tag.sub?`<div class="tag-stat-inline"><span class="tag-stat-num">${tag.sub}</span><span class="tag-stat-lbl">sub</span></div>`:''}
          ${tag.dish?`<div class="tag-stat-inline"><span class="tag-stat-num">${tag.dish}</span><span class="tag-stat-lbl">dish</span></div>`:''}
          ${!tag.ing&&!tag.sub&&!tag.dish?'<span style="font-size:9px;color:var(--g300)">—</span>':''}
        </div>
        <div class="tag-conns">
          ${tag.conns.length?tag.conns.map(c=>
            `<span class="tag-conn-pill ${c.rel}">${connLabel(c)}</span>`
          ).join(''):'<span class="tag-no-conn">—</span>'}
        </div>
      </div>`;

      // Expanded detail — compact two-column layout
      html+=`<div class="tag-detail${isExp?' open':''}" onclick="event.stopPropagation()">
        <div class="td-grid">
          <div>
            <div class="td-section"><div class="td-section-title">📊 Usage</div>
              <div class="td-stats">
                <div class="td-stat"><div class="td-stat-val">${tag.ing}</div><div class="td-stat-lbl">Ingr.</div></div>
                <div class="td-stat"><div class="td-stat-val">${tag.sub}</div><div class="td-stat-lbl">Sub-R.</div></div>
                <div class="td-stat"><div class="td-stat-val">${tag.dish}</div><div class="td-stat-lbl">Dishes</div></div>
              </div>
            </div>
            ${tag.rule?`<div class="td-section"><div class="td-section-title">📐 Rule</div><div class="td-rule">${tag.rule}</div></div>`:''}
            <div class="td-section"><div class="td-section-title">⚙️ Settings</div>
              <dl class="td-settings">
                <dt>Source</dt><dd>${tag.source==='ingredient'?'Ingredient (auto rollup)':tag.source==='dish'?'Manual per dish':'Computed (rule)'}</dd>
                <dt>Visible</dt><dd>${tag.visible?'Client facing':'Internal only'}</dd>
                ${tag.source==='ingredient'?'<dt>Rollup</dt><dd>Ingredient → Sub-Recipe → Dish</dd>':''}
              </dl>
            </div>
          </div>
          <div>
            <div class="td-section"><div class="td-section-title">🔗 Connections</div>`;
      if(tag.conns.length){
        tag.conns.forEach(c=>{
          const target=TAGS.find(x=>x.id===c.tid);
          const tType=target?TAG_TYPES.find(x=>x.id===target.type):null;
          const cIdx=tag.conns.indexOf(c);

            <div class="td-conn-info">
              <div class="td-conn-name">${target?target.name:c.tid}</div>
              <div class="td-conn-desc">${tType?tType.name:''} · ${c.d}</div>

            <button class="td-conn-rm" onclick="event.stopPropagation();removeConn('${tag.id}','${c.tid}')" title="Remove connection">✕</button>

      } else {

        </div>
      </div>`;
    });
  });
  body.innerHTML=html;
}

function toggleTagProp(tagId, prop){
  const tag=TAGS.find(t=>t.id===tagId);
  if(!tag) return;
  tag[prop]=!tag[prop];
  renderContent();
  // Sync to sheet
  const payload={action:'update_tag',tagId};
  if(prop==='visible') payload.clientVisible=tag.visible;
  if(prop==='labelBold') payload.labelBold=tag.labelBold;
  gasPost(payload).then(r=>console.log('Updated:',r)).catch(e=>console.error(e));
}

function editTag(tagId){
  const tag=TAGS.find(t=>t.id===tagId);
  if(!tag) return;
  const newName=prompt('Rename tag:',tag.name);
  if(!newName||newName===tag.name) return;
  tag.name=newName.trim();
  renderContent();renderTypeList();
  gasPost({action:'update_tag',tagId,name:tag.name}).then(r=>console.log('Renamed:',r)).catch(e=>console.error(e));
}

let editingConnSource=null;
let editingConnIdx=null;

function openEditConn(sourceId, connIdx){
  const tag=TAGS.find(t=>t.id===sourceId);
  if(!tag||!tag.conns[connIdx]) return;
  const c=tag.conns[connIdx];
  editingConnSource=sourceId;
  editingConnIdx=connIdx;
  // Reuse the connection modal but pre-fill it
  connSourceId=sourceId;
  const target=TAGS.find(t=>t.id===c.tid);
  document.getElementById('conn-source-name').textContent=tag.name+' → editing';
  // Build target dropdown with current selected
  const sel=document.getElementById('conn-target');
  sel.innerHTML=TAGS.filter(t=>t.id!==sourceId).map(t=>`<option value="${t.id}" ${t.id===c.tid?'selected':''}>${t.emoji} ${t.name}</option>`).join('');
  sel.value=c.tid;
  document.getElementById('conn-rel').value=c.rel;
  document.getElementById('conn-desc').value=c.d||'';
  document.getElementById('conn-modal').classList.add('open');
}

// Override saveConnection to handle edits
const _origSaveConn=typeof saveConnection==='function'?saveConnection:null;

function removeConn(sourceId, targetId){
  const tag=TAGS.find(t=>t.id===sourceId);
  if(!tag) return;
  tag.conns=tag.conns.filter(c=>c.tid!==targetId);
  renderContent();
  // Sync to sheet
  gasPost({action:'delete_connection',sourceTagId:sourceId,targetTagId:targetId}).then(r=>console.log('Connection removed:',r)).catch(e=>console.error(e));
}

function toggleExpand(id){
  expandedTag=expandedTag===id?null:id;
  renderContent();
}

function navigateToTag(id){
  const tag=TAGS.find(t=>t.id===id);
  if(!tag) return;
  if(tag.type!==activeType) selectType(tag.type);
  expandedTag=id;
  renderContent();
  setTimeout(()=>{
    const el=document.querySelector('.tag-detail.open');
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
}

function deleteTag(id){
  const idx=TAGS.findIndex(t=>t.id===id);
  if(idx>=0) TAGS.splice(idx,1);
  TAGS.forEach(t=>{t.conns=t.conns.filter(c=>c.tid!==id);});
  expandedTag=null;
  renderContent();renderTypeList();
  // Sync to sheet
  gasDeleteTag(id).then(r=>console.log('Deleted from sheet:',r)).catch(e=>console.error(e));
}

function openAddModal(){
  document.getElementById('new-type').innerHTML=TAG_TYPES.map(t=>`<option value="${t.id}" ${t.id===activeType?'selected':''}>${t.name}</option>`).join('');
  document.getElementById('new-name').value='';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('new-name').focus(),50);
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('open');}
function saveNewTag(){
  const name=document.getElementById('new-name').value.trim();
  if(!name) return;
  const tag={
    id:name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now(),
    name,type:document.getElementById('new-type').value,
    emoji:(TYPE_META[document.getElementById('new-type').value]||{}).icon||'🏷️',
    subtype:'Custom',source:document.getElementById('new-source').value,
    visible:document.getElementById('new-visible').classList.contains('on'),
    ing:0,sub:0,dish:0,conns:[],rule:''
  };
  TAGS.push(tag);
  closeAddModal();renderContent();renderTypeList();
  // Sync to sheet
  gasAddTag(tag).then(r=>console.log('Added to sheet:',r)).catch(e=>console.error(e));
}

// ══ ADD CONNECTION MODAL ══
let connSourceId=null;

function openConnModal(tagId){
  editingConnSource=null;editingConnIdx=null; // reset edit mode
  connSourceId=tagId;
  const tag=TAGS.find(t=>t.id===tagId);
  document.getElementById('conn-source-name').textContent=tag?tag.name:'';
  // Build target dropdown — all tags except self and already connected
  const existing=new Set((tag?.conns||[]).map(c=>c.tid));
  const opts=TAGS.filter(t=>t.id!==tagId&&!existing.has(t.id));
  const sel=document.getElementById('conn-target');
  sel.innerHTML='<option value="">— Select target —</option>'+
    TAG_TYPES.map(tt=>{
      const group=opts.filter(t=>t.type===tt.id);
      if(!group.length) return '';
      return `<optgroup label="${tt.name}">`+group.map(t=>`<option value="${t.id}">${t.emoji} ${t.name}</option>`).join('')+'</optgroup>';
    }).join('');
  document.getElementById('conn-modal').classList.add('open');
}

function closeConnModal(){
  document.getElementById('conn-modal').classList.remove('open');
  connSourceId=null;
  editingConnSource=null;editingConnIdx=null;
}

function saveConnection(){
  if(!connSourceId) return;
  const targetId=document.getElementById('conn-target').value;
  const rel=document.getElementById('conn-rel').value;
  const desc=document.getElementById('conn-desc').value.trim()||rel;
  if(!targetId||!rel) return;
  const tag=TAGS.find(t=>t.id===connSourceId);
  if(!tag) return;

  if(editingConnIdx!==null && editingConnSource){
    // Edit mode — remove old connection, add updated one
    const oldConn=tag.conns[editingConnIdx];
    if(oldConn){
      gasPost({action:'delete_connection',sourceTagId:connSourceId,targetTagId:oldConn.tid}).catch(e=>console.error(e));
    }
    tag.conns[editingConnIdx]={tid:targetId,rel,d:desc};
    editingConnSource=null;editingConnIdx=null;
  } else {
    // New connection
    tag.conns.push({tid:targetId,rel,d:desc});
  }

  closeConnModal();
  renderContent();
  gasAddConnection(connSourceId,targetId,rel,desc).then(r=>console.log('Connection saved:',r)).catch(e=>console.error(e));
}

// Init — load from Google Sheet
loadFromSheet().then(()=>{
  selectType('allergens');
}).catch(()=>{
  // Fallback to hardcoded defaults
  TAG_TYPES = DEFAULT_TYPES;
  TAGS = _TAGS_PLACEHOLDER;
  selectType('allergens');
});
</script>
